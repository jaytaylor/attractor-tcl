name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:
    inputs:
      live_smoke:
        description: "Run live-provider smoke tests"
        required: false
        default: "false"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Tcl
        run: sudo apt-get update && sudo apt-get install -y tcl tcllib tcl-tls ripgrep graphviz
      - name: Probe Tcl/TLS runtime
        run: tclsh tools/tls_runtime_probe.tcl
      - name: Run test suite
        run: make test

  live-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.live_smoke == 'true' }}
    runs-on: ubuntu-latest
    environment: live-provider-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Tcl
        run: sudo apt-get update && sudo apt-get install -y tcl tcllib tcl-tls ripgrep graphviz
      - name: Probe Tcl/TLS runtime
        run: tclsh tools/tls_runtime_probe.tcl
      - name: Select providers with configured keys
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          providers=()
          if [ -n "${OPENAI_API_KEY:-}" ]; then providers+=("openai"); fi
          if [ -n "${ANTHROPIC_API_KEY:-}" ]; then providers+=("anthropic"); fi
          if [ -n "${GEMINI_API_KEY:-}" ]; then providers+=("gemini"); fi

          if [ "${#providers[@]}" -eq 0 ]; then
            echo "No provider API keys are configured for live-smoke." >&2
            exit 1
          fi

          provider_csv="$(IFS=,; echo "${providers[*]}")"
          echo "E2E_LIVE_PROVIDERS=$provider_csv" >> "$GITHUB_ENV"
          echo "live providers: $provider_csv"
      - name: Run live smoke suite
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: make test-e2e
